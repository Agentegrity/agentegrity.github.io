name: Update download count

on:
  schedule:
    - cron: "17 6 * * *"   # daily, ~06:17 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

concurrency:
  group: update-downloads
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch total downloads from Metabase
        run: python3 scripts/fetch-downloads.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- downloads.json; then
            echo "Download count unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads.json
          git commit -m "Update download count [skip ci]"
          git push
